# ============================================================
# docker-compose.yml — real.sensorcensor.xyz (production VPS)
# ============================================================
# This repo is deployed alongside PersonalDevOps on the same VPS.
# The shared nginx (devops-nginx) routes real.sensorcensor.xyz
# to container "client" on port 80. That container's own nginx
# handles internal routing to server (API) and admin (panel).
#
# ⚠️ No ports are exposed to the host — all inter-container
#    communication is over the devops_shared Docker network.
# ⚠️ No version: field (deprecated since docker-compose v2).
# ⚠️ No HEALTHCHECK — the shared nginx handles failures gracefully.
# ============================================================

services:
  # -----------------------------
  # Backend API — Express/TypeScript
  # Listens on internal port 5001
  # -----------------------------
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
      args:
        - UID=1000
        - GID=1000
    container_name: server
    user: "1000:1000"
    env_file:
      - server/.env
    environment:
      - PORT=5001
      - DATABASE_PATH=/data/database.db
      - NODE_ENV=production
      - CLIENT_URL=https://real.sensorcensor.xyz
      - RUNWARE_IMAGE_MODEL=runware:z-image@turbo
      - ENABLE_SCHEDULED_JOBS=true
      - ENABLE_FAKE_DATA=true
    volumes:
      - ./database:/data:rw
    restart: unless-stopped
    networks:
      - devops_shared

  # -----------------------------
  # Client Frontend — React SPA
  # Entry point for shared nginx
  # Listens on internal port 80
  # Routes: / → static files, /api/* → server:5001
  # -----------------------------
  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        - VITE_BACKEND_DEV_MODE=false
        - VITE_API_BASE_DEV=http://localhost:5001
        - VITE_API_BASE_PROD=http://server:5001
        - VITE_USE_RELATIVE_API=true
        - VITE_DEBUG_LOGS=false
        - VITE_SHOW_HOROSCOPES=true
    container_name: client
    restart: unless-stopped
    networks:
      - devops_shared

  # -----------------------------
  # Admin Panel — React SPA
  # Serves on its own subdomain (e.g. admin.real.sensorcensor.xyz)
  # Listens on internal port 80
  # -----------------------------
  admin:
    build:
      context: .
      dockerfile: admin/Dockerfile
      args:
        - VITE_BACKEND_DEV_MODE=false
        - VITE_API_BASE_DEV=http://localhost:5001
        - VITE_API_BASE_PROD=http://server:5001
        - VITE_USE_RELATIVE_API=true
        - VITE_FRONTEND_DEV_MODE=false
        - VITE_CLIENT_URL_DEV=http://localhost:5173
        - VITE_CLIENT_URL_PROD=https://real.sensorcensor.xyz
    container_name: admin
    restart: unless-stopped
    networks:
      - devops_shared

networks:
  devops_shared:
    external: true
