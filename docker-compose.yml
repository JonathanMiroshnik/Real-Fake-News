# ============================================================
# docker-compose.yml — real.sensorcensor.xyz (production VPS)
# ============================================================
# This repo is deployed alongside PersonalDevOps on the same VPS.
# The shared nginx (devops-nginx) routes real.sensorcensor.xyz
# to container "client" on port 80. That container's own nginx
# handles internal routing to server (API) and admin (panel).
#
# ⚠️ No ports are exposed to the host — all inter-container
#    communication is over the devops_shared Docker network.
# ⚠️ No version: field (deprecated since docker-compose v2).
# ⚠️ No HEALTHCHECK — the shared nginx handles failures gracefully.
# ============================================================

services:
  # -----------------------------
  # Backend API — Express/TypeScript
  # Listens on internal port 5001
  # -----------------------------
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: server
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=5001
      - DATABASE_PATH=/data/database.db
      - SQLITE_DATA_PATH=/data
      - IMAGES_DATA_PATH=/data/images
      - CLIENT_URL=${CLIENT_URL:-https://real.sensorcensor.xyz}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme123}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - NEWSDATA_API_KEY=${NEWSDATA_API_KEY}
      - RUNWARE_API_KEY=${RUNWARE_API_KEY}
      - RUNWARE_IMAGE_MODEL=${RUNWARE_IMAGE_MODEL:-runware:z-image@turbo}
      - GMAIL_USER=${GMAIL_USER}
      - GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD}
      - ENABLE_SCHEDULED_JOBS=${ENABLE_SCHEDULED_JOBS:-true}
      - ENABLE_FAKE_DATA=${ENABLE_FAKE_DATA:-true}
      - LOCAL_DEV_BACKEND=${LOCAL_DEV_BACKEND:-false}
    volumes:
      - ${SQLITE_DATA_PATH:-./database}:/data:rw
    restart: unless-stopped
    networks:
      - devops_shared

  # -----------------------------
  # Client Frontend — React SPA
  # Entry point for shared nginx
  # Listens on internal port 80
  # Routes: / → static files, /api/* → server:5001
  # -----------------------------
  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        - VITE_BACKEND_DEV_MODE=${VITE_BACKEND_DEV_MODE:-false}
        - VITE_API_BASE_DEV=${VITE_API_BASE_DEV:-http://localhost:5001}
        - VITE_API_BASE_PROD=${VITE_API_BASE_PROD:-http://server:5001}
        - VITE_USE_RELATIVE_API=${VITE_USE_RELATIVE_API:-true}
        - VITE_DEBUG_LOGS=${VITE_DEBUG_LOGS:-false}
        - VITE_SHOW_HOROSCOPES=${VITE_SHOW_HOROSCOPES:-true}
    container_name: client
    restart: unless-stopped
    networks:
      - devops_shared

  # -----------------------------
  # Admin Panel — React SPA
  # Serves on its own subdomain (e.g. admin.real.sensorcensor.xyz)
  # Listens on internal port 80
  # -----------------------------
  admin:
    build:
      context: .
      dockerfile: admin/Dockerfile
      args:
        - VITE_BACKEND_DEV_MODE=${VITE_BACKEND_DEV_MODE:-false}
        - VITE_API_BASE_DEV=${VITE_API_BASE_DEV:-http://localhost:5001}
        - VITE_API_BASE_PROD=${VITE_API_BASE_PROD:-http://server:5001}
        - VITE_USE_RELATIVE_API=${VITE_USE_RELATIVE_API:-true}
        - VITE_FRONTEND_DEV_MODE=${VITE_FRONTEND_DEV_MODE:-false}
        - VITE_CLIENT_URL_DEV=${VITE_CLIENT_URL_DEV:-http://localhost:5173}
        - VITE_CLIENT_URL_PROD=${VITE_CLIENT_URL_PROD:-https://real.sensorcensor.xyz}
    container_name: admin
    restart: unless-stopped
    networks:
      - devops_shared

networks:
  devops_shared:
    external: true

