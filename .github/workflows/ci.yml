name: CI Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Quality Checks (Lint, Format, TypeScript)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install root dependencies
        run: npm ci

      - name: 📦 Install workspace dependencies
        run: |
          npm ci --workspace=client --install-strategy=nested
          npm ci --workspace=server --install-strategy=nested
          npm ci --workspace=admin --install-strategy=nested

      - name: 🔍 Check formatting (Prettier)
        run: npm run format:check

      - name: 🧪 TypeScript type-check
        run: npm run typecheck

      - name: 🧹 Lint (ESLint)
        run: npm run lint

      - name: 🏗️ Build
        run: npm run build

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install root dependencies
        run: npm ci

      - name: 📦 Install workspace dependencies
        run: |
          npm ci --workspace=client --install-strategy=nested
          npm ci --workspace=server --install-strategy=nested
          npm ci --workspace=admin --install-strategy=nested

      - name: 🧪 Run unit tests
        run: npm test
