# docker-compose.override.yml — local development overrides
# ============================================================
# Auto-merged by docker compose when present alongside docker-compose.yml.
# Adds port mappings for testing on your dev machine.
# NOT used on the VPS — there, only docker-compose.yml applies.
# ============================================================

services:
  server:
    ports:
      - '5001:5001'

  client:
    ports:
      - '5173:80'

  admin:
    ports:
      - '5174:80'
